<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost-chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="lobby">
        <div class="box">
            <h2>Ghost-chat</h2>
            <button onclick="createNewRoom()">Create Secure Room</button>
            <div style="margin: 20px 0; color: #666;">--- OR ---</div>
            <input type="text" id="joinIn" placeholder="Enter Room Key">
            <button onclick="joinExistingRoom()">Join Room</button>
        </div>
    </div>

    <div id="chat">
        <div style="background: var(--box-bg); width: 100%; text-align: center; padding: 10px; border-bottom: 1px solid var(--border-color); font-family: monospace;">
            Room Key: <span id="currentKey" style="color: #888;"></span>
        </div>
        
        <div id="messages"></div>
        
        <div id="input-area">
            <input type="text" id="mIn" placeholder="Type an encrypted message..." onkeypress="if(event.key === 'Enter') sendText()">
            <button onclick="sendText()">Send</button>
            <button id="mic" onclick="toggleMic()">Mic</button>
            <input type="file" id="fileIn" style="display:none" onchange="sendFile(this.files[0])">
            <button onclick="document.getElementById('fileIn').click()">File</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
